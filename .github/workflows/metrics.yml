name: Metrics
on:
  # Met à jour les statistiques toutes les 24 heures (à minuit)
  schedule: [{cron: "0 0 * * *"}]
  # Permet de lancer le script manuellement depuis l'onglet "Actions"
  workflow_dispatch:
  # Met à jour à chaque push sur la branche principale
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Le token standard de GitHub Action (généré automatiquement)
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Options d'affichage
          user: JUDOKA104
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          
          # Pour afficher les langages les plus utilisés
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css
          plugin_languages_limit: 8
